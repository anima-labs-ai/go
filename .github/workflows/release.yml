name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # The 2026 rebrand find-replace (anima.email -> useanima.sh) once mangled
      # the code identifier `anima.emails.*` into the nonsense token
      # `useanima[.]shs.*` (dot, no brackets). Never ship a release containing
      # that token. The [.] bracket notation keeps this file from matching
      # its own grep pattern.
      - name: Lint for rebrand-mangle token
        run: |
          if grep -rn --exclude-dir=.git "useanima[.]shs" .; then
            echo "::error::Found the rebrand-mangle token 'useanima[.]shs' (dot for [.]) — a broken anima.email -> useanima.sh find-replace artifact. Restore the original anima.emails.* identifier before releasing."
            exit 1
          fi

      - name: Verify module
        run: go mod verify

      - name: Run tests
        run: go test -race -v ./...

      - name: Verify tag matches module
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Release tag: $TAG"
          echo "Go modules are published automatically via the Go proxy."
          echo "Ensure the tag follows semantic versioning (e.g., v1.0.0)."
